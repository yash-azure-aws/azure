<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yash Kumar Wavhal | Cloud Engineer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}

/* Animated Gradient */
@keyframes gradientMove {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Virtual Network Lines */
.network{
    position:absolute;
    width:100%;
    height:100%;
    background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveNet 20s linear infinite;
}

@keyframes moveNet{
    from{background-position:0 0;}
    to{background-position:40px 40px;}
}

/* Floating Cloud Effects */
.cloud{
    position:absolute;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    filter:blur(50px);
    animation: float 25s infinite linear;
}

.cloud1{
    width:300px;height:300px;
    top:10%;left:-10%;
}

.cloud2{
    width:400px;height:400px;
    bottom:10%;right:-15%;
}

@keyframes float{
    from{transform:translateX(0);}
    to{transform:translateX(200px);}
}

/* Card */
.card{
    position:relative;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    padding:50px;
    width:380px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.6);
    transition:0.4s ease;
    z-index:2;
}

.card:hover{
    transform:translateY(-10px);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    margin-bottom:15px;
    font-size:16px;
    opacity:0.9;
}

/* AWS Badge */
.aws-badge{
    display:inline-block;
    background:#ff9900;
    color:black;
    font-weight:bold;
    padding:6px 15px;
    border-radius:20px;
    font-size:13px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(255,153,0,0.8);
}

/* Buttons */
.btn{
    display:block;
    text-decoration:none;
    padding:12px;
    margin:10px 0;
    border-radius:30px;
    font-weight:600;
    transition:0.3s ease;
    color:white;
}

.instagram{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
}

.linkedin{
    background:#0077b5;
}

.maps{
    background:#34a853;
}

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="network"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="card">
    <h1>Yash Kumar Wavhal</h1>
    <p>Cloud Engineer</p>

    <div class="">lets connect on</div>

    <a href="https://www.instagram.com/_yashwavhal__?igsh=cjN0bW9nNXBjMGw1&utm_source=qr" target="_blank" class="btn instagram">
        Instagram
    </a>

    <a href="https://www.linkedin.com/in/yash-kumar-wavhal-7009a520b?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app" target="_blank" class="btn linkedin">
        LinkedIn
    </a>

    <a href="https://maps.app.goo.gl/2ZouMei1KXbe8Bnj6?g_st=ipc" target="_blank" class="btn maps">
        My Business
    </a>

    <footer>© 2026 Yash Kumar Wavhal</footer>
</div>

</body>
</html>
